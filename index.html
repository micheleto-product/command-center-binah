<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Binah Command Center</title>

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/boot.css">
    <link rel="stylesheet" href="css/animations.css">

    <!-- Feature 02 -->

    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/hud.css">
    <link rel="stylesheet" href="css/effects.css">

</head>

<body>

    <!-- ====================================================== -->
    <!-- BOOT -->
    <!-- ====================================================== -->

    <section
        id="boot-screen"
        class="screen">

        <div class="boot-container">

            <h1 class="boot-logo">

                BINAH

            </h1>

            <h2 class="boot-subtitle">

                COMMAND CENTER

            </h2>

            <div
                id="boot-terminal">

            </div>

            <div class="boot-progress">

                <div
                    id="boot-progress-fill">

                </div>

            </div>

        </div>

    </section>

    <!-- ====================================================== -->
    <!-- LOGIN -->
    <!-- ====================================================== -->

    <section
        id="login-screen"
        class="screen hidden">

        <div class="hud-grid"></div>

        <div class="hud-lines"></div>

        <div class="login-card">

            <div class="login-header">

                <span class="status-dot"></span>

                <h1>

                    BINAH

                </h1>

            </div>

            <p class="system-name">

                COMMAND CENTER

            </p>

            <div class="divider"></div>

            <form
                id="login-form">

                <label>

                    USERNAME

                </label>

                <input
                    id="username"
                    type="text"
                    autocomplete="off">

                <label>

                    PASSWORD

                </label>

                <input
                    id="password"
                    type="password">

                <button
                    id="access-button"
                    type="submit">

                    ACCESS

                </button>

            </form>

            <div class="system-status">

                <div>

                    SECURITY

                    <span>

                        READY

                    </span>

                </div>

                <div>

                    AI CORE

                    <span>

                        ONLINE

                    </span>

                </div>

                <div>

                    NETWORK

                    <span>

                        CONNECTED

                    </span>

                </div>

            </div>

        </div>

        <div id="transition-screen" class="hidden">

            <div class="transition-logo">

                BINAH COMMAND CENTER

            </div>

            <div
                id="transition-message"
                class="transition-text">

                INITIALIZING COMMAND SYSTEM...

            </div>

            <div id="loading-bar">

                <div id="loading-progress"></div>

            </div>

        </div>

    </section>

    <script src="js/boot.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/transition.js"></script>
    <script src="js/login.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
