<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Logs Module</title>

    <link
        rel="stylesheet"
        href="../../css/variables.css">

    <link
        rel="stylesheet"
        href="logs.css">

</head>

<body>

<div id="logs-module">

    <header id="module-header">

        <h1>

            System Logs

        </h1>

        <p>

            Monitor events, activities and system history.

        </p>

    </header>

    <section id="logs-panel">

        <div class="log-row">

            <span class="log-time">

                00:00:00

            </span>

            <span class="log-level info">

                INFO

            </span>

            <span class="log-message">

                System initialized.

            </span>

        </div>

        <div class="log-row">

            <span class="log-time">

                00:00:01

            </span>

            <span class="log-level success">

                OK

            </span>

            <span class="log-message">

                Authentication service ready.

            </span>

        </div>

        <div class="log-row">

            <span class="log-time">

                00:00:02

            </span>

            <span class="log-level warning">

                WARN

            </span>

            <span class="log-message">

                Waiting for new events...

            </span>

        </div>

    </section>

</div>

<script src="../js/navigation.js"></script>
<script src="logs.js"></script>

</body>

</html>
