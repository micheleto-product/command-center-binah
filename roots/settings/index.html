<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Settings Module</title>

    <link
        rel="stylesheet"
        href="../../css/variables.css">

    <link
        rel="stylesheet"
        href="settings.css">

</head>

<body>

<div id="settings-module">

    <header id="module-header">

        <h1>

            System Settings

        </h1>

        <p>

            Configure the Binah Command Center environment.

        </p>

    </header>

    <section id="settings-grid">

        <article
            class="settings-card"
            id="theme-card">

            <h3>

                Theme

            </h3>

            <p>

                Dark Mode

            </p>

        </article>

        <article
            class="settings-card"
            id="language-card">

            <h3>

                Language

            </h3>

            <p>

                English

            </p>

        </article>

        <article
            class="settings-card"
            id="security-card">

            <h3>

                Security

            </h3>

            <p>

                Standard

            </p>

        </article>

        <article
            class="settings-card"
            id="updates-card">

            <h3>

                Updates

            </h3>

            <p>

                Automatic

            </p>

        </article>

    </section>

</div>

<script src="../js/navigation.js"></script>
<script src="../js/eventBus.js"></script>
<script src="settings.js"></script>

</body>

</html>
