<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Users Module</title>

    <link
        rel="stylesheet"
        href="../../css/variables.css">

    <link
        rel="stylesheet"
        href="users.css">

</head>

<body>

<div id="users-module">

    <header id="module-header">

        <h1>

            Users Center

        </h1>

        <p>

            Manage users, permissions and active sessions.

        </p>

    </header>

    <section id="users-grid">

        <article class="users-card">

            <h3>

                Total Users

            </h3>

            <p class="users-value">

                0

            </p>

        </article>

        <article class="users-card">

            <h3>

                Active Sessions

            </h3>

            <p class="users-value">

                0

            </p>

        </article>

        <article class="users-card">

            <h3>

                Administrators

            </h3>

            <p class="users-value">

                1

            </p>

        </article>

        <article class="users-card">

            <h3>

                Last Login

            </h3>

            <p class="users-value">

                --

            </p>

        </article>

    </section>

</div>

<script src="../js/navigation.js"></script>
<script src="users.js"></script>

</body>

</html>
