<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Security Module</title>

    <link
        rel="stylesheet"
        href="../../css/variables.css">

    <link
        rel="stylesheet"
        href="security.css">

</head>

<body>

<div id="security-module">

    <!-- ========================================= -->
    <!-- TOPBAR                                   -->
    <!-- ========================================= -->

    <header id="module-header">

        <h1>

            Security Center

        </h1>

        <p>

            Monitor system integrity and security status.

        </p>

    </header>

    <!-- ========================================= -->
    <!-- GRID                                     -->
    <!-- ========================================= -->

    <section id="security-grid">

        <article
            class="security-card">

            <h3>

                Firewall

            </h3>

            <p
                class="security-value">

                ACTIVE

            </p>

        </article>

        <article
            class="security-card">

            <h3>

                Intrusion Detection

            </h3>

            <p
                class="security-value">

                ENABLED

            </p>

        </article>

        <article
            class="security-card">

            <h3>

                Encryption

            </h3>

            <p
                class="security-value">

                AES-256

            </p>

        </article>

        <article
            class="security-card">

            <h3>

                Threat Level

            </h3>

            <p
                class="security-value">

                LOW

            </p>

        </article>

    </section>

</div>

<script src="../js/navigation.js"></script>
<script src="../js/eventBus.js"></script>
<script src="security.js"></script>

</body>

</html>
